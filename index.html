<!DOCTYPE html>
<html>
<head>
  <title>My TV App</title>

  <style>
    body {
      margin: 0;
      background: #141414;
      color: white;
      font-family: Arial;
    }

    h1 {
      padding: 20px;
    }

    .row {
      margin-left: 20px;
    }

    .movies {
      display: flex;
      overflow-x: auto;
    }

    .movie {
      min-width: 200px;
      margin-right: 10px;
      cursor: pointer;
      transition: transform 0.3s;
    }

    .movie img {
      width: 100%;
      border-radius: 5px;
    }

    .movie:hover {
      transform: scale(1.2);
    }

    #playerContainer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 999;
    }

    .close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 30px;
      cursor: pointer;
      z-index: 10;
    }

    video, iframe {
      width: 80%;
      max-height: 80%;
    }
  </style>
</head>

<body>

<h1>🎬 My TV</h1>

<div class="row">
  <h2>Trending</h2>

  <div class="movies">

    <!-- YOUR GOOGLE DRIVE VIDEO -->
    <div class="movie" onclick="play('drive:1nEamW8-hMLfxVwiVaAKGYa8U6EpWYqrL')">
      <img src="thumb1.jpg">
      <p>My Big Movie</p>
    </div>

    <!-- OPTIONAL: DIRECT MP4 (Dropbox etc) -->
    <div class="movie" onclick="play('https://www.dropbox.com/s/YOUR_ID/movie.mp4?raw=1')">
      <img src="thumb2.jpg">
      <p>Another Movie</p>
    </div>

  </div>
</div>

<!-- PLAYER -->
<div id="playerContainer">
  <div class="close" onclick="closePlayer()">✖</div>
  <div id="player"></div>
</div>

<script>
function play(source) {
  const container = document.getElementById("playerContainer");
  const player = document.getElementById("player");

  // GOOGLE DRIVE
  if (source.startsWith("drive:")) {
    const fileId = source.replace("drive:", "");

    player.innerHTML = `
      <iframe 
        src="https://drive.google.com/file/d/1nEamW8-hMLfxVwiVaAKGYa8U6EpWYqrL/view?usp=drive_link"
        allow="autoplay"
        allowfullscreen>
      </iframe>
    `;
  }

  // NORMAL MP4
  else {
    player.innerHTML = `
      <video controls autoplay>
        <source src="${source}" type="video/mp4">
      </video>
    `;
  }

  container.style.display = "flex";
}

function closePlayer() {
  document.getElementById("playerContainer").style.display = "none";
  document.getElementById("player").innerHTML = "";
}
</script>

</body>
</html>
